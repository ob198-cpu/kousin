<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CDP免許更新管理</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --panel: #fff;
      --ink: #111827;
      --muted: #667085;
      --line: #d5dfeb;
      --head: #e8eff6;
      --navy: #102a43;
      --red: #b42318;
      --red-bg: #fff1f0;
      --amber: #b54708;
      --amber-bg: #fff7e6;
      --blue: #175cd3;
      --blue-bg: #eff6ff;
      --green: #067647;
      --green-bg: #ecfdf3;
      --slate: #475467;
      --slate-bg: #f2f4f7;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Yu Gothic", "Meiryo", system-ui, sans-serif;
      background: var(--bg);
      color: var(--ink);
    }
    main {
      width: 100%;
      margin: 0 auto;
      padding: 10px 14px 14px;
    }
    .top,
    .toolbar,
    .form-actions,
    .tabs,
    .toolbar-actions,
    .row-actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }
    .top,
    .toolbar { justify-content: space-between; }
    .top { margin-bottom: 8px; }
    h1 {
      margin: 0;
      color: var(--navy);
      font-size: 27px;
      letter-spacing: 0;
    }
    h2 {
      margin: 0;
      color: var(--navy);
      font-size: 19px;
      letter-spacing: 0;
    }
    button {
      min-height: 36px;
      border: 1px solid #bfd0e3;
      border-radius: 7px;
      background: #fff;
      color: #17324d;
      cursor: pointer;
      font: inherit;
      font-size: 14px;
      font-weight: 900;
      padding: 7px 11px;
    }
    button.primary,
    button.active {
      background: #175cd3;
      border-color: #175cd3;
      color: #fff;
    }
    button.danger-button {
      color: var(--red);
      border-color: #fecdca;
      background: #fff7f6;
    }
    .screen { display: none; }
    .screen.active { display: block; }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 8px 18px rgba(16, 32, 51, .05);
    }
    .summary {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 8px;
    }
    .metric {
      border-radius: 8px;
      border: 1px solid var(--line);
      padding: 8px 11px;
      min-height: 64px;
    }
    .metric .label {
      font-size: 14px;
      font-weight: 900;
      margin-bottom: 2px;
    }
    .metric strong {
      display: inline-block;
      min-width: 32px;
      font-size: 32px;
      line-height: 1;
      margin-right: 7px;
      vertical-align: middle;
    }
    .metric .note {
      display: inline;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.25;
    }
    .danger { background: var(--red-bg); border-color: #fecdca; }
    .danger .label, .danger strong { color: var(--red); }
    .warning { background: var(--amber-bg); border-color: #fedf89; }
    .warning .label, .warning strong { color: var(--amber); }
    .guide { background: var(--blue-bg); border-color: #bfdbfe; }
    .guide .label, .guide strong { color: var(--blue); }
    .ok { background: var(--green-bg); border-color: #abefc6; }
    .ok .label, .ok strong { color: var(--green); }
    .neutral { background: var(--slate-bg); border-color: #d0d5dd; }
    .neutral .label, .neutral strong { color: var(--slate); }
    .rule-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin: 7px 0;
    }
    .rule-strip span {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      min-height: 30px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      padding: 5px 9px;
      color: #17324d;
      font-size: 13px;
      font-weight: 900;
    }
    .rule-strip b { color: #315674; }
    .table-wrap {
      overflow-x: auto;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    table {
      width: 100%;
      min-width: 1780px;
      border-collapse: collapse;
    }
    th,
    td {
      border-bottom: 1px solid var(--line);
      padding: 8px 9px;
      text-align: left;
      vertical-align: top;
      font-size: 15px;
      line-height: 1.35;
    }
    th {
      background: var(--head);
      color: #315674;
      font-weight: 900;
      white-space: nowrap;
    }
    tbody tr:last-child td { border-bottom: 0; }
    .tag {
      display: inline-flex;
      justify-content: center;
      min-width: 72px;
      border-radius: 999px;
      padding: 6px 9px;
      font-weight: 900;
      white-space: nowrap;
    }
    .tag.danger { background: #fee4e2; color: var(--red); }
    .tag.warning { background: #ffedcc; color: var(--amber); }
    .tag.guide { background: #dbeafe; color: var(--blue); }
    .tag.ok { background: #d1fadf; color: var(--green); }
    .tag.neutral { background: #e4e7ec; color: #344054; }
    .due {
      color: var(--red);
      font-size: 18px;
      font-weight: 900;
      white-space: nowrap;
    }
    .task {
      max-width: 360px;
      font-size: 16px;
      font-weight: 900;
      line-height: 1.45;
    }
    .muted {
      color: var(--muted);
      font-size: 13px;
    }
    .basis-line {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      max-width: none;
    }
    .basis-item {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #f8fafc;
      padding: 5px 8px;
      font-size: 13px;
      white-space: nowrap;
    }
    .basis-item span {
      color: var(--muted);
      font-weight: 900;
    }
    .basis-item strong {
      color: var(--ink);
      font-weight: 900;
    }
    .small-button {
      min-height: 31px;
      padding: 5px 8px;
      font-size: 13px;
    }
    .form-panel {
      max-width: 1180px;
      padding: 14px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-top: 12px;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .field.wide { grid-column: span 2; }
    .field.full { grid-column: 1 / -1; }
    label {
      color: #315674;
      font-size: 14px;
      font-weight: 900;
    }
    input,
    select,
    textarea {
      width: 100%;
      min-height: 40px;
      border: 1px solid #c8d5e4;
      border-radius: 7px;
      background: #fff;
      color: var(--ink);
      font: inherit;
      font-size: 15px;
      padding: 8px 10px;
    }
    textarea {
      min-height: 92px;
      resize: vertical;
    }
    input:focus,
    select:focus,
    textarea:focus {
      outline: 3px solid #dbeafe;
      border-color: #60a5fa;
    }
    .quote-panel {
      margin-top: 12px;
      padding: 12px;
    }
    .quote-tools {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: end;
    }
    .hidden { display: none; }
    @media (max-width: 1180px) {
      .summary { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 760px) {
      .top, .toolbar, .form-actions { align-items: stretch; flex-direction: column; }
      .summary, .grid { grid-template-columns: 1fr; }
      .field.wide { grid-column: auto; }
      .quote-tools { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <header class="top">
      <h1>免許更新期限管理</h1>
      <nav class="tabs" aria-label="画面切替">
        <button type="button" class="active" data-screen="home">優先一覧</button>
        <button type="button" data-screen="entry">登録・編集</button>
      </nav>
    </header>

    <section id="homeScreen" class="screen active">
      <section class="summary" aria-label="集計">
        <div class="metric danger">
          <div class="label">危険</div>
          <strong id="dangerCount">0</strong><span class="note">今日確認</span>
        </div>
        <div class="metric warning">
          <div class="label">注意</div>
          <strong id="warningCount">0</strong><span class="note">30日以内</span>
        </div>
        <div class="metric guide">
          <div class="label">案内</div>
          <strong id="guideCount">0</strong><span class="note">CDP受付</span>
        </div>
        <div class="metric ok">
          <div class="label">対応不要</div>
          <strong id="okCount">0</strong><span class="note">期限に余裕</span>
        </div>
        <div class="metric neutral">
          <div class="label">総人数</div>
          <strong id="peopleCount">0</strong><span class="note">重複除外</span>
        </div>
        <div class="metric neutral">
          <div class="label">総回数</div>
          <strong id="sessionCount">0</strong><span class="note">年度記録</span>
        </div>
      </section>

      <section>
        <div class="toolbar">
          <h2>優先一覧</h2>
          <div class="toolbar-actions">
            <button type="button" class="primary" data-screen="entry">新規登録</button>
            <button type="button" id="exportCsv">CSV出力</button>
            <button type="button" id="importCsvButton">CSV読込</button>
            <button type="button" id="resetSamples">サンプルに戻す</button>
            <input id="importCsv" class="hidden" type="file" accept=".csv,text/csv">
          </div>
        </div>
        <div class="rule-strip" aria-label="期限計算">
          <span><b>CDP講習受付</b> 免許期限の6か月前</span>
          <span><b>制度上の講習可能</b> 免許期限の9か月前</span>
          <span><b>DIPS申請</b> 免許期限の6か月前から1か月前まで</span>
          <span><b>講習証明期限</b> 講習証明取得日+3か月-1日</span>
          <span><b>参照資料</b> 国交省 技能証明等 / 登録更新講習機関資料</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>判定</th>
                <th>対応期限</th>
                <th>対象</th>
                <th>区分</th>
                <th>必要な対応</th>
                <th>期限の根拠</th>
                <th>重要日</th>
                <th>免許確認</th>
                <th>年度/回数</th>
                <th>状態</th>
                <th>引用元</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="listBody"></tbody>
          </table>
        </div>
      </section>
    </section>

    <section id="entryScreen" class="screen">
      <section class="panel form-panel" aria-label="登録フォーム">
        <h2 id="formTitle">対象者を登録</h2>
        <form id="entryForm">
          <input type="hidden" id="recordId">
          <div class="grid">
            <div class="field wide">
              <label for="targetName">対象</label>
              <input id="targetName" required placeholder="氏名または管理番号">
            </div>
            <div class="field">
              <label for="customerType">区分</label>
              <select id="customerType">
                <option>既存</option>
                <option>新規</option>
                <option>初学者</option>
              </select>
            </div>
            <div class="field">
              <label for="courseProvider">受講機関</label>
              <select id="courseProvider">
                <option>CDP</option>
                <option>他機関</option>
                <option>未確認</option>
              </select>
            </div>
            <div class="field">
              <label for="licenseNo">免許番号</label>
              <input id="licenseNo" placeholder="任意">
            </div>
            <div class="field">
              <label for="licenseIssuedDate">免許取得日</label>
              <input id="licenseIssuedDate" type="date">
            </div>
            <div class="field">
              <label for="licenseChecked">免許証確認</label>
              <select id="licenseChecked">
                <option>未確認</option>
                <option>有効確認済み</option>
                <option>期限切れ疑い</option>
              </select>
            </div>
            <div class="field">
              <label for="fiscalYear">年度</label>
              <input id="fiscalYear" inputmode="numeric" placeholder="2026">
            </div>
            <div class="field">
              <label for="sessionNo">回数</label>
              <input id="sessionNo" inputmode="numeric" placeholder="1">
            </div>
            <div class="field">
              <label for="licenseExpiry">免許期限</label>
              <input id="licenseExpiry" type="date" required>
            </div>
            <div class="field">
              <label for="applicationDate">申込日</label>
              <input id="applicationDate" type="date">
            </div>
            <div class="field">
              <label for="courseDate">講習修了日</label>
              <input id="courseDate" type="date">
            </div>
            <div class="field">
              <label for="certificateIssuedDate">講習証明取得日</label>
              <input id="certificateIssuedDate" type="date">
            </div>
            <div class="field">
              <label for="certificateNo">講習修了証明書番号</label>
              <input id="certificateNo" placeholder="他機関受講者は手入力">
            </div>
            <div class="field">
              <label for="dipsDate">DIPS申請日</label>
              <input id="dipsDate" type="date">
            </div>
            <div class="field">
              <label for="confirmedDate">更新完了確認日</label>
              <input id="confirmedDate" type="date">
            </div>
            <div class="field">
              <label for="newExpiry">新しい免許期限</label>
              <input id="newExpiry" type="date">
            </div>
            <div class="field full">
              <label for="referenceSource">引用元資料</label>
              <select id="referenceSource">
                <option>手入力</option>
                <option>技能証明書</option>
                <option>更新講習修了証明書</option>
                <option>DIPS画面</option>
                <option>Google Drive資料コピー</option>
                <option>国交省制度資料</option>
              </select>
            </div>
            <div class="field full">
              <label for="sourceMemo">資料引用メモ</label>
              <input id="sourceMemo" placeholder="例: 免許証PDF、Google Drive資料、本人提出スクリーンショット">
            </div>
          </div>
          <div class="form-actions">
            <button type="submit" class="primary">登録する</button>
            <button type="button" id="clearForm">入力クリア</button>
            <button type="button" data-screen="home">一覧へ戻る</button>
          </div>
        </form>

        <div class="panel quote-panel">
          <h2>資料から期限を引用するサンプル</h2>
          <div class="quote-tools">
            <div class="field">
              <label for="quoteText">資料のテキストを貼り付け</label>
              <textarea id="quoteText" placeholder="例: 免許取得日 2023/07/31 有効期限 2026/07/31 講習証明取得日 2026/06/10"></textarea>
            </div>
            <button type="button" id="extractExpiry">日付を抽出して反映</button>
          </div>
        </div>
      </section>
    </section>
  </main>

  <script>
    const STORAGE_KEY = "cdp-renewal-license-records-v3";
    const form = document.getElementById("entryForm");
    const SAMPLE_RECORDS = [
      {
        id: "sample-a",
        targetName: "サンプル受講者A",
        customerType: "既存",
        courseProvider: "CDP",
        licenseNo: "",
        licenseIssuedDate: "2023-07-31",
        licenseChecked: "有効確認済み",
        fiscalYear: "2026",
        sessionNo: "1",
        licenseExpiry: "2026-07-31",
        applicationDate: "2026-06-27",
        courseDate: "2026-06-10",
        certificateIssuedDate: "2026-06-10",
        certificateNo: "SAMPLE-001",
        dipsDate: "",
        confirmedDate: "",
        newExpiry: "",
        referenceSource: "技能証明書",
        sourceMemo: "サンプル"
      },
      {
        id: "sample-b",
        targetName: "サンプル受講者B",
        customerType: "新規",
        courseProvider: "他機関",
        licenseNo: "",
        licenseIssuedDate: "2023-10-10",
        licenseChecked: "有効確認済み",
        fiscalYear: "2026",
        sessionNo: "2",
        licenseExpiry: "2026-10-10",
        applicationDate: "2026-06-12",
        courseDate: "2026-06-10",
        certificateIssuedDate: "2026-06-10",
        certificateNo: "",
        dipsDate: "2026-06-20",
        confirmedDate: "",
        newExpiry: "",
        referenceSource: "更新講習修了証明書",
        sourceMemo: "他機関受講の手入力サンプル"
      },
      {
        id: "sample-c",
        targetName: "サンプル受講者C",
        customerType: "既存",
        courseProvider: "CDP",
        licenseNo: "",
        licenseIssuedDate: "2024-01-15",
        licenseChecked: "未確認",
        fiscalYear: "2026",
        sessionNo: "3",
        licenseExpiry: "2027-01-15",
        applicationDate: "",
        courseDate: "",
        certificateIssuedDate: "",
        certificateNo: "",
        dipsDate: "",
        confirmedDate: "",
        newExpiry: "",
        referenceSource: "技能証明書",
        sourceMemo: "免許証確認待ち"
      },
      {
        id: "sample-d",
        targetName: "サンプル受講者D",
        customerType: "既存",
        courseProvider: "CDP",
        licenseNo: "",
        licenseIssuedDate: "2023-08-31",
        licenseChecked: "有効確認済み",
        fiscalYear: "2026",
        sessionNo: "4",
        licenseExpiry: "2026-08-31",
        applicationDate: "2026-06-01",
        courseDate: "2026-06-05",
        certificateIssuedDate: "2026-06-05",
        certificateNo: "SAMPLE-004",
        dipsDate: "2026-06-18",
        confirmedDate: "2026-07-08",
        newExpiry: "",
        referenceSource: "DIPS画面",
        sourceMemo: "更新完了後の新有効期限入力待ち"
      }
    ];
    const fields = [
      "recordId",
      "targetName",
      "customerType",
      "courseProvider",
      "licenseNo",
      "licenseIssuedDate",
      "licenseChecked",
      "fiscalYear",
      "sessionNo",
      "licenseExpiry",
      "applicationDate",
      "courseDate",
      "certificateIssuedDate",
      "certificateNo",
      "dipsDate",
      "confirmedDate",
      "newExpiry",
      "referenceSource",
      "sourceMemo"
    ];

    function sampleCopy() {
      return SAMPLE_RECORDS.map((record) => ({ ...record }));
    }

    function loadRecords() {
      const stored = localStorage.getItem(STORAGE_KEY);
      if (!stored) {
        const samples = sampleCopy();
        saveRecords(samples);
        return samples;
      }
      try {
        const records = JSON.parse(stored);
        return Array.isArray(records) && records.length ? records : sampleCopy();
      } catch (_) {
        return sampleCopy();
      }
    }

    function saveRecords(records) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
    }

    function makeId() {
      return `rec-${Date.now()}-${Math.random().toString(36).slice(2, 10)}`;
    }

    function toDate(value) {
      if (!value) return null;
      const date = new Date(`${value}T00:00:00`);
      return Number.isNaN(date.getTime()) ? null : date;
    }

    function fmt(date) {
      if (!date) return "-";
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      return `${y}/${m}/${d}`;
    }

    function addMonths(date, months) {
      if (!date) return null;
      const result = new Date(date);
      const day = result.getDate();
      result.setMonth(result.getMonth() + months);
      if (result.getDate() !== day) result.setDate(0);
      return result;
    }

    function addDays(date, days) {
      if (!date) return null;
      const result = new Date(date);
      result.setDate(result.getDate() + days);
      return result;
    }

    function daysUntil(date) {
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      return Math.ceil((date - today) / 86400000);
    }

    function minDate(...dates) {
      const valid = dates.filter(Boolean);
      if (!valid.length) return null;
      return valid.sort((a, b) => a - b)[0];
    }

    function analyze(record) {
      const licenseIssuedDate = toDate(record.licenseIssuedDate);
      const enteredLicenseExpiry = toDate(record.licenseExpiry);
      const licenseExpiry = enteredLicenseExpiry || (licenseIssuedDate ? addMonths(licenseIssuedDate, 36) : null);
      const courseDate = toDate(record.courseDate);
      const certificateIssuedDate = toDate(record.certificateIssuedDate) || courseDate;
      const dipsDate = toDate(record.dipsDate);
      const confirmedDate = toDate(record.confirmedDate);
      const newExpiry = toDate(record.newExpiry);
      const legalCourseStart = addMonths(licenseExpiry, -9);
      const cdpCourseStart = addMonths(licenseExpiry, -6);
      const applicationStart = addMonths(licenseExpiry, -6);
      const applicationDeadline = addMonths(licenseExpiry, -1);
      const certificateDeadline = certificateIssuedDate ? addDays(addMonths(certificateIssuedDate, 3), -1) : null;
      const followDeadline = certificateIssuedDate ? minDate(applicationDeadline, certificateDeadline) : cdpCourseStart;
      const nextCourseStart = newExpiry ? addMonths(newExpiry, -6) : null;
      const dueDate = confirmedDate && newExpiry ? nextCourseStart : followDeadline;
      const dueDays = dueDate ? daysUntil(dueDate) : 9999;

      let level = "ok";
      let label = "対応不要";
      let task = "現時点では対応不要";
      let status = "期限に余裕あり";

      if (licenseExpiry && daysUntil(licenseExpiry) < 0 && !newExpiry) {
        level = "danger";
        label = "危険";
        task = "免許期限切れの可能性を確認";
        status = "免許期限超過 / 更新未確認";
      } else if (confirmedDate && !newExpiry) {
        level = "danger";
        label = "危険";
        task = "更新後の新しい免許期限へ差し替える";
        status = "更新完了確認済み / 新有効期限未入力";
      } else if (confirmedDate && newExpiry) {
        task = "次回更新時期まで保管";
        status = "更新完了 / 次回管理";
        if (dueDays <= 30) {
          level = "warning";
          label = "注意";
        }
      } else if (certificateIssuedDate || courseDate) {
        if (record.courseProvider === "他機関" && !record.certificateNo) {
          level = "warning";
          label = "注意";
          task = "他機関の講習修了証明書番号を手入力";
          status = "他機関受講 / 証明情報未入力";
        } else {
          task = dipsDate ? "更新完了と新有効期限を確認" : "DIPS申請を完了させる";
          status = dipsDate ? "DIPS申請中 / 更新完了未確認" : "講習修了 / DIPS申請待ち";
          if (dueDays <= 0) {
            level = "danger";
            label = "危険";
          } else if (dueDays <= 30) {
            level = "warning";
            label = "注意";
          }
        }
      } else if (licenseExpiry && cdpCourseStart && daysUntil(cdpCourseStart) <= 30) {
        task = "CDP更新講習の案内";
        status = "CDP受付対象";
        level = daysUntil(cdpCourseStart) <= 0 ? "guide" : "warning";
        label = daysUntil(cdpCourseStart) <= 0 ? "案内" : "注意";
      } else if (licenseExpiry && legalCourseStart && daysUntil(legalCourseStart) <= 0) {
        task = "制度上は受講可能、CDP受付時期を確認";
        status = "制度上受講可能 / CDP受付前";
        level = "ok";
      }

      if (record.licenseChecked !== "有効確認済み" && !newExpiry) {
        if (level === "ok") {
          level = "warning";
          label = "注意";
        }
        if (!task.includes("免許")) task = "ドローン免許証の有効期限を確認";
        status = `${status} / 免許証未確認`;
      }

      return {
        level,
        label,
        dueDate,
        task,
        status,
        licenseExpiry,
        legalCourseStart,
        cdpCourseStart,
        applicationStart,
        applicationDeadline,
        certificateDeadline
      };
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      })[char]);
    }

    function basisHtml(record, result) {
      const items = [];
      if (result.licenseExpiry) items.push(["免許期限", fmt(result.licenseExpiry)]);
      if (record.licenseIssuedDate) items.push(["免許取得", fmt(toDate(record.licenseIssuedDate))]);
      if (result.cdpCourseStart) items.push(["CDP受付", fmt(result.cdpCourseStart)]);
      if (result.applicationStart) items.push(["申請開始", fmt(result.applicationStart)]);
      if (result.applicationDeadline) items.push(["申請期限", fmt(result.applicationDeadline)]);
      if (result.certificateDeadline) items.push(["講習証明期限", fmt(result.certificateDeadline)]);
      return items.map(([name, value]) => (
        `<div class="basis-item"><span>${escapeHtml(name)}</span><strong>${escapeHtml(value)}</strong></div>`
      )).join("");
    }

    function personKey(record) {
      return `${record.targetName || ""}|${record.licenseNo || ""}`.trim();
    }

    function showScreen(name) {
      document.getElementById("homeScreen").classList.toggle("active", name === "home");
      document.getElementById("entryScreen").classList.toggle("active", name === "entry");
      document.querySelectorAll("[data-screen]").forEach((button) => {
        button.classList.toggle("active", button.dataset.screen === name && button.closest(".tabs"));
      });
    }

    function render() {
      const records = loadRecords();
      const rows = records
        .map((record) => ({ record, result: analyze(record) }))
        .sort((a, b) => {
          const ad = a.result.dueDate ? a.result.dueDate.getTime() : 8640000000000000;
          const bd = b.result.dueDate ? b.result.dueDate.getTime() : 8640000000000000;
          return ad - bd;
        });

      const counts = { danger: 0, warning: 0, guide: 0, ok: 0 };
      rows.forEach(({ result }) => { counts[result.level] += 1; });
      document.getElementById("dangerCount").textContent = counts.danger;
      document.getElementById("warningCount").textContent = counts.warning;
      document.getElementById("guideCount").textContent = counts.guide;
      document.getElementById("okCount").textContent = counts.ok;
      document.getElementById("peopleCount").textContent = new Set(records.map(personKey)).size;
      document.getElementById("sessionCount").textContent = records.length;

      document.getElementById("listBody").innerHTML = rows.map(({ record, result }) => `
        <tr>
          <td><span class="tag ${result.level}">${escapeHtml(result.label)}</span></td>
          <td><div class="${result.level === "danger" || result.level === "warning" ? "due" : ""}">${fmt(result.dueDate)}</div></td>
          <td>
            <strong>${escapeHtml(record.targetName)}</strong><br>
            <span class="muted">${escapeHtml(record.licenseNo || record.sourceMemo || "")}</span>
          </td>
          <td>
            <strong>${escapeHtml(record.customerType || "")}</strong><br>
            <span class="muted">${escapeHtml(record.courseProvider || "")}</span>
          </td>
          <td><div class="task">${escapeHtml(result.task)}</div></td>
          <td><div class="basis-line">${basisHtml(record, result)}</div></td>
          <td>
            免許取得 ${escapeHtml(record.licenseIssuedDate ? fmt(toDate(record.licenseIssuedDate)) : "-")}<br>
            講習証明取得 ${escapeHtml(record.certificateIssuedDate ? fmt(toDate(record.certificateIssuedDate)) : "-")}
          </td>
          <td>${escapeHtml(record.licenseChecked || "未確認")}</td>
          <td>${escapeHtml(record.fiscalYear || "-")}年度<br><span class="muted">${escapeHtml(record.sessionNo || "-")}回目</span></td>
          <td>${escapeHtml(result.status)}</td>
          <td>
            ${escapeHtml(record.referenceSource || "手入力")}<br>
            <span class="muted">${escapeHtml(record.sourceMemo || "")}</span>
          </td>
          <td>
            <div class="row-actions">
              <button type="button" class="small-button" data-edit="${escapeHtml(record.id)}">編集</button>
              <button type="button" class="small-button danger-button" data-delete="${escapeHtml(record.id)}">削除</button>
            </div>
          </td>
        </tr>
      `).join("");
    }

    function readForm() {
      const data = {};
      fields.forEach((field) => { data[field] = document.getElementById(field).value.trim(); });
      return {
        id: data.recordId || makeId(),
        targetName: data.targetName,
        customerType: data.customerType,
        courseProvider: data.courseProvider,
        licenseNo: data.licenseNo,
        licenseIssuedDate: data.licenseIssuedDate,
        licenseChecked: data.licenseChecked,
        fiscalYear: data.fiscalYear,
        sessionNo: data.sessionNo,
        licenseExpiry: data.licenseExpiry,
        applicationDate: data.applicationDate,
        courseDate: data.courseDate,
        certificateIssuedDate: data.certificateIssuedDate,
        certificateNo: data.certificateNo,
        dipsDate: data.dipsDate,
        confirmedDate: data.confirmedDate,
        newExpiry: data.newExpiry,
        referenceSource: data.referenceSource,
        sourceMemo: data.sourceMemo
      };
    }

    function fillForm(record) {
      fields.forEach((field) => {
        const id = field === "recordId" ? "recordId" : field;
        document.getElementById(id).value = field === "recordId" ? record.id || "" : record[field] || "";
      });
      document.getElementById("customerType").value = record.customerType || "既存";
      document.getElementById("courseProvider").value = record.courseProvider || "CDP";
      document.getElementById("licenseChecked").value = record.licenseChecked || "未確認";
      document.getElementById("referenceSource").value = record.referenceSource || "手入力";
      document.getElementById("formTitle").textContent = "対象者を編集";
      showScreen("entry");
    }

    function clearForm() {
      form.reset();
      document.getElementById("recordId").value = "";
      document.getElementById("customerType").value = "既存";
      document.getElementById("courseProvider").value = "CDP";
      document.getElementById("licenseChecked").value = "未確認";
      document.getElementById("referenceSource").value = "手入力";
      document.getElementById("formTitle").textContent = "対象者を登録";
    }

    function exportCsv() {
      const records = loadRecords();
      const headers = fields.filter((field) => field !== "recordId");
      const csv = [headers.join(",")].concat(records.map((record) => (
        headers.map((key) => `"${String(record[key] || "").replace(/"/g, '""')}"`).join(",")
      ))).join("\n");
      const blob = new Blob([`\ufeff${csv}`], { type: "text/csv;charset=utf-8" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "renewal_license_records.csv";
      a.click();
      URL.revokeObjectURL(a.href);
    }

    function parseCsvLine(line) {
      const result = [];
      let current = "";
      let quoted = false;
      for (let i = 0; i < line.length; i += 1) {
        const char = line[i];
        if (char === '"' && quoted && line[i + 1] === '"') {
          current += '"';
          i += 1;
        } else if (char === '"') {
          quoted = !quoted;
        } else if (char === "," && !quoted) {
          result.push(current);
          current = "";
        } else {
          current += char;
        }
      }
      result.push(current);
      return result;
    }

    function normalizeDateText(value) {
      const match = String(value).match(/(20\d{2})[\/\-.年](\d{1,2})[\/\-.月](\d{1,2})/);
      if (!match) return "";
      const [, y, m, d] = match;
      return `${y}-${String(m).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
    }

    function extractLabeledDate(text, labels) {
      const source = String(text).replace(/\s+/g, " ");
      for (const label of labels) {
        const pattern = new RegExp(`${label}[^0-9]{0,20}(20\\d{2}[\\/\\-.年]\\d{1,2}[\\/\\-.月]\\d{1,2})`);
        const match = source.match(pattern);
        if (match) return normalizeDateText(match[1]);
      }
      return "";
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      const record = readForm();
      const records = loadRecords();
      const existingIndex = records.findIndex((item) => (
        item.id === record.id ||
        (personKey(item) === personKey(record) && item.fiscalYear === record.fiscalYear)
      ));
      if (existingIndex >= 0) records[existingIndex] = { ...records[existingIndex], ...record, id: records[existingIndex].id };
      else records.push(record);
      saveRecords(records);
      clearForm();
      render();
      showScreen("home");
    });

    document.querySelectorAll("[data-screen]").forEach((button) => {
      button.addEventListener("click", () => showScreen(button.dataset.screen));
    });
    document.getElementById("clearForm").addEventListener("click", clearForm);
    document.getElementById("exportCsv").addEventListener("click", exportCsv);
    document.getElementById("importCsvButton").addEventListener("click", () => document.getElementById("importCsv").click());
    document.getElementById("importCsv").addEventListener("change", async (event) => {
      const file = event.target.files[0];
      if (!file) return;
      const text = await file.text();
      const lines = text.replace(/^\ufeff/, "").split(/\r?\n/).filter(Boolean);
      const headers = parseCsvLine(lines.shift() || "");
      const records = lines.map((line) => {
        const cols = parseCsvLine(line);
        const record = { id: makeId() };
        headers.forEach((key, index) => { record[key] = cols[index] || ""; });
        return record;
      });
      saveRecords(records.length ? records : sampleCopy());
      event.target.value = "";
      render();
    });
    document.getElementById("resetSamples").addEventListener("click", () => {
      saveRecords(sampleCopy());
      clearForm();
      render();
    });
    document.getElementById("extractExpiry").addEventListener("click", () => {
      const text = document.getElementById("quoteText").value;
      const licenseIssued = extractLabeledDate(text, ["免許取得日", "技能証明取得日", "交付日", "発行日"]);
      const licenseExpiry = extractLabeledDate(text, ["免許期限", "有効期限", "有効期間満了日", "満了日"]);
      const certificateIssued = extractLabeledDate(text, ["講習証明取得日", "講習修了証明書発行日", "修了証明書発行日", "講習修了日"]);
      if (!licenseIssued && !licenseExpiry && !certificateIssued) {
        alert("日付を見つけられませんでした。例: 免許取得日 2023/07/31 有効期限 2026/07/31 講習証明取得日 2026/06/10");
        return;
      }
      if (licenseIssued) document.getElementById("licenseIssuedDate").value = licenseIssued;
      if (licenseExpiry) document.getElementById("licenseExpiry").value = licenseExpiry;
      if (certificateIssued) {
        document.getElementById("certificateIssuedDate").value = certificateIssued;
        if (!document.getElementById("courseDate").value) document.getElementById("courseDate").value = certificateIssued;
      }
      const parts = [];
      if (licenseIssued) parts.push("免許取得日");
      if (licenseExpiry) parts.push("免許期限");
      if (certificateIssued) parts.push("講習証明取得日");
      document.getElementById("referenceSource").value = "Google Drive資料コピー";
      document.getElementById("sourceMemo").value = `資料テキストから${parts.join("・")}を引用`;
    });
    document.getElementById("listBody").addEventListener("click", (event) => {
      const editId = event.target.dataset.edit;
      const deleteId = event.target.dataset.delete;
      const records = loadRecords();
      if (editId) {
        const record = records.find((item) => item.id === editId);
        if (record) fillForm(record);
      }
      if (deleteId) {
        const next = records.filter((item) => item.id !== deleteId);
        saveRecords(next.length ? next : sampleCopy());
        render();
      }
    });

    render();
  </script>
</body>
</html>
