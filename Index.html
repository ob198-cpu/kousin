<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CDP免許更新管理</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --panel: #fff;
      --ink: #111827;
      --muted: #667085;
      --line: #d5dfeb;
      --head: #e8eff6;
      --navy: #102a43;
      --red: #b42318;
      --red-bg: #fff1f0;
      --amber: #b54708;
      --amber-bg: #fff7e6;
      --blue: #175cd3;
      --blue-bg: #eff6ff;
      --green: #067647;
      --green-bg: #ecfdf3;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Yu Gothic", "Meiryo", system-ui, sans-serif;
      background: var(--bg);
      color: var(--ink);
    }
    main {
      width: min(1500px, 100%);
      margin: 0 auto;
      padding: 12px;
    }
    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }
    h1 {
      margin: 0;
      font-size: 27px;
      letter-spacing: 0;
      color: var(--navy);
    }
    h2 {
      margin: 0;
      font-size: 19px;
      letter-spacing: 0;
      color: var(--navy);
    }
    .tabs,
    .toolbar-actions,
    .row-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    button {
      min-height: 38px;
      border: 1px solid #bfd0e3;
      border-radius: 7px;
      background: #fff;
      color: #17324d;
      cursor: pointer;
      font: inherit;
      font-size: 14px;
      font-weight: 900;
      padding: 8px 12px;
    }
    button.primary,
    button.active {
      background: #175cd3;
      border-color: #175cd3;
      color: #fff;
    }
    button.danger-button {
      color: var(--red);
      border-color: #fecdca;
      background: #fff7f6;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 8px 18px rgba(16, 32, 51, .05);
    }
    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 10px;
    }
    .metric {
      border-radius: 8px;
      border: 1px solid var(--line);
      padding: 10px 12px;
      min-height: 78px;
    }
    .metric .label {
      font-size: 15px;
      font-weight: 900;
      margin-bottom: 5px;
    }
    .metric strong {
      display: inline-block;
      min-width: 40px;
      font-size: 36px;
      line-height: 1;
      margin-right: 8px;
      vertical-align: middle;
    }
    .metric .note {
      display: inline;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }
    .danger { background: var(--red-bg); border-color: #fecdca; }
    .danger .label,
    .danger strong { color: var(--red); }
    .warning { background: var(--amber-bg); border-color: #fedf89; }
    .warning .label,
    .warning strong { color: var(--amber); }
    .guide { background: var(--blue-bg); border-color: #bfdbfe; }
    .guide .label,
    .guide strong { color: var(--blue); }
    .ok { background: var(--green-bg); border-color: #abefc6; }
    .ok .label,
    .ok strong { color: var(--green); }
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .table-wrap {
      overflow-x: auto;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    table {
      width: 100%;
      min-width: 1180px;
      border-collapse: collapse;
    }
    th,
    td {
      border-bottom: 1px solid var(--line);
      padding: 9px 10px;
      text-align: left;
      vertical-align: top;
      font-size: 15px;
      line-height: 1.45;
    }
    th {
      background: var(--head);
      color: #315674;
      font-weight: 900;
      white-space: nowrap;
    }
    tbody tr:last-child td { border-bottom: 0; }
    .tag {
      display: inline-flex;
      justify-content: center;
      min-width: 70px;
      border-radius: 999px;
      padding: 7px 10px;
      font-weight: 900;
    }
    .tag.danger { background: #fee4e2; color: var(--red); }
    .tag.warning { background: #ffedcc; color: var(--amber); }
    .tag.guide { background: #dbeafe; color: var(--blue); }
    .tag.ok { background: #d1fadf; color: var(--green); }
    .due {
      color: var(--red);
      font-size: 18px;
      font-weight: 900;
      white-space: nowrap;
    }
    .task {
      max-width: 260px;
      font-size: 17px;
      font-weight: 900;
      line-height: 1.45;
    }
    .muted {
      color: var(--muted);
      font-size: 13px;
    }
    .basis-line {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      max-width: 500px;
    }
    .basis-item {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #f8fafc;
      padding: 5px 8px;
      font-size: 13px;
      white-space: nowrap;
    }
    .basis-item span {
      color: var(--muted);
      font-weight: 900;
    }
    .basis-item strong {
      color: var(--ink);
      font-weight: 900;
    }
    .small-button {
      min-height: 32px;
      padding: 5px 8px;
      font-size: 13px;
    }
    .screen { display: none; }
    .screen.active { display: block; }
    .form-panel {
      max-width: 980px;
      padding: 16px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 12px;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .field.wide { grid-column: span 2; }
    label {
      color: #315674;
      font-size: 14px;
      font-weight: 900;
    }
    input,
    select {
      width: 100%;
      min-height: 42px;
      border: 1px solid #c8d5e4;
      border-radius: 7px;
      background: #fff;
      color: var(--ink);
      font: inherit;
      font-size: 16px;
      padding: 8px 10px;
    }
    input:focus,
    select:focus {
      outline: 3px solid #dbeafe;
      border-color: #60a5fa;
    }
    .form-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    .rules {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }
    .rule-card {
      padding: 12px;
      font-size: 14px;
      line-height: 1.7;
    }
    .hidden { display: none; }
    @media (max-width: 980px) {
      .top,
      .toolbar { align-items: stretch; flex-direction: column; }
      .summary,
      .rules,
      .grid { grid-template-columns: 1fr; }
      .field.wide { grid-column: auto; }
    }
  </style>
</head>
<body>
  <main>
    <header class="top">
      <h1>免許更新期限管理</h1>
      <nav class="tabs" aria-label="画面切替">
        <button type="button" class="active" data-screen="home">優先一覧</button>
        <button type="button" data-screen="entry">登録・編集</button>
      </nav>
    </header>

    <section id="homeScreen" class="screen active">
      <section class="summary" aria-label="リスク件数">
        <div class="metric danger">
          <div class="label">危険</div>
          <strong id="dangerCount">0</strong><span class="note">今日確認</span>
        </div>
        <div class="metric warning">
          <div class="label">注意</div>
          <strong id="warningCount">0</strong><span class="note">30日以内</span>
        </div>
        <div class="metric guide">
          <div class="label">案内</div>
          <strong id="guideCount">0</strong><span class="note">講習案内</span>
        </div>
        <div class="metric ok">
          <div class="label">対応不要</div>
          <strong id="okCount">0</strong><span class="note">期限に余裕</span>
        </div>
      </section>

      <section>
        <div class="toolbar">
          <h2>優先一覧</h2>
          <div class="toolbar-actions">
            <button type="button" class="primary" data-screen="entry">新規登録</button>
            <button type="button" id="exportCsv">CSV出力</button>
            <button type="button" id="importCsvButton">CSV読込</button>
            <button type="button" id="resetSamples">サンプルに戻す</button>
            <input id="importCsv" class="hidden" type="file" accept=".csv,text/csv">
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>判定</th>
                <th>対応期限</th>
                <th>対象</th>
                <th>必要な対応</th>
                <th>期限の根拠</th>
                <th>状態</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="listBody"></tbody>
          </table>
        </div>
      </section>

      <section class="rules" aria-label="期限計算">
        <div class="panel rule-card">
          <strong>更新確認期限</strong><br>
          早い方を採用: 免許期限の1か月前 / 講習修了日 + 3か月 - 1日
        </div>
        <div class="panel rule-card">
          <strong>基準日</strong><br>
          講習開始: 9か月前　DIPS申請開始: 6か月前　申請期限: 1か月前
        </div>
      </section>
    </section>

    <section id="entryScreen" class="screen">
      <section class="panel form-panel" aria-label="登録フォーム">
        <h2 id="formTitle">対象者を登録</h2>
        <form id="entryForm">
          <input type="hidden" id="recordId">
          <div class="grid">
            <div class="field wide">
              <label for="targetName">対象</label>
              <input id="targetName" required placeholder="氏名または管理番号">
            </div>
            <div class="field">
              <label for="customerType">区分</label>
              <select id="customerType">
                <option>既存</option>
                <option>新規</option>
                <option>初学者</option>
              </select>
            </div>
            <div class="field">
              <label for="licenseNo">免許番号</label>
              <input id="licenseNo" placeholder="任意">
            </div>
            <div class="field">
              <label for="licenseExpiry">免許期限</label>
              <input id="licenseExpiry" type="date" required>
            </div>
            <div class="field">
              <label for="applicationDate">申込日</label>
              <input id="applicationDate" type="date">
            </div>
            <div class="field">
              <label for="courseDate">講習修了日</label>
              <input id="courseDate" type="date">
            </div>
            <div class="field">
              <label for="certificateNo">講習修了証明書番号</label>
              <input id="certificateNo" placeholder="任意">
            </div>
            <div class="field">
              <label for="dipsDate">DIPS申請日</label>
              <input id="dipsDate" type="date">
            </div>
            <div class="field">
              <label for="confirmedDate">更新完了確認日</label>
              <input id="confirmedDate" type="date">
            </div>
            <div class="field">
              <label for="newExpiry">新しい免許期限</label>
              <input id="newExpiry" type="date">
            </div>
          </div>
          <div class="form-actions">
            <button type="submit" class="primary">登録する</button>
            <button type="button" id="clearForm">入力クリア</button>
            <button type="button" data-screen="home">一覧へ戻る</button>
          </div>
        </form>
      </section>
    </section>
  </main>

  <script>
    const STORAGE_KEY = "cdp-renewal-license-records-v2";
    const form = document.getElementById("entryForm");
    const SAMPLE_RECORDS = [
      {
        id: "sample-a",
        targetName: "サンプル受講者A",
        customerType: "既存",
        licenseNo: "",
        licenseExpiry: "2026-07-31",
        applicationDate: "2026-06-01",
        courseDate: "2026-06-10",
        certificateNo: "",
        dipsDate: "",
        confirmedDate: "",
        newExpiry: ""
      },
      {
        id: "sample-b",
        targetName: "サンプル受講者B",
        customerType: "既存",
        licenseNo: "",
        licenseExpiry: "2026-10-10",
        applicationDate: "2026-06-12",
        courseDate: "2026-06-10",
        certificateNo: "",
        dipsDate: "2026-06-20",
        confirmedDate: "",
        newExpiry: ""
      },
      {
        id: "sample-c",
        targetName: "サンプル受講者C",
        customerType: "新規",
        licenseNo: "",
        licenseExpiry: "2027-04-22",
        applicationDate: "",
        courseDate: "",
        certificateNo: "",
        dipsDate: "",
        confirmedDate: "",
        newExpiry: ""
      }
    ];
    const fields = [
      "recordId",
      "targetName",
      "customerType",
      "licenseNo",
      "licenseExpiry",
      "applicationDate",
      "courseDate",
      "certificateNo",
      "dipsDate",
      "confirmedDate",
      "newExpiry"
    ];

    function sampleCopy() {
      return SAMPLE_RECORDS.map((record) => ({ ...record }));
    }

    function loadRecords() {
      const stored = localStorage.getItem(STORAGE_KEY);
      if (!stored) {
        const samples = sampleCopy();
        saveRecords(samples);
        return samples;
      }
      try {
        const records = JSON.parse(stored);
        return Array.isArray(records) && records.length ? records : sampleCopy();
      } catch (_) {
        return sampleCopy();
      }
    }

    function saveRecords(records) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
    }

    function makeId() {
      return `rec-${Date.now()}-${Math.random().toString(36).slice(2, 10)}`;
    }

    function toDate(value) {
      if (!value) return null;
      const date = new Date(`${value}T00:00:00`);
      return Number.isNaN(date.getTime()) ? null : date;
    }

    function fmt(date) {
      if (!date) return "-";
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      return `${y}/${m}/${d}`;
    }

    function addMonths(date, months) {
      if (!date) return null;
      const result = new Date(date);
      const day = result.getDate();
      result.setMonth(result.getMonth() + months);
      if (result.getDate() !== day) result.setDate(0);
      return result;
    }

    function addDays(date, days) {
      if (!date) return null;
      const result = new Date(date);
      result.setDate(result.getDate() + days);
      return result;
    }

    function daysUntil(date) {
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      return Math.ceil((date - today) / 86400000);
    }

    function minDate(...dates) {
      const valid = dates.filter(Boolean);
      if (!valid.length) return null;
      return valid.sort((a, b) => a - b)[0];
    }

    function analyze(record) {
      const licenseExpiry = toDate(record.licenseExpiry);
      const courseDate = toDate(record.courseDate);
      const dipsDate = toDate(record.dipsDate);
      const confirmedDate = toDate(record.confirmedDate);
      const newExpiry = toDate(record.newExpiry);
      const courseStart = addMonths(licenseExpiry, -9);
      const applicationDeadline = addMonths(licenseExpiry, -1);
      const certificateDeadline = courseDate ? addDays(addMonths(courseDate, 3), -1) : null;
      const followDeadline = courseDate ? minDate(applicationDeadline, certificateDeadline) : courseStart;
      const nextCourseStart = newExpiry ? addMonths(newExpiry, -9) : null;
      const dueDate = confirmedDate && newExpiry ? nextCourseStart : followDeadline;
      const dueDays = dueDate ? daysUntil(dueDate) : 9999;

      let level = "ok";
      let label = "対応不要";
      let task = "現時点では対応不要";
      let status = "期限に余裕あり";

      if (confirmedDate && newExpiry) {
        task = "次回更新時期まで保管";
        status = "更新完了";
        if (dueDays <= 30) {
          level = "warning";
          label = "注意";
        }
      } else if (courseDate) {
        task = dipsDate ? "新有効期限を確認" : "DIPS申請を完了させる";
        status = dipsDate ? "DIPS申請中 / 更新完了未確認" : "講習修了 / DIPS申請待ち";
        if (dueDays <= 0) {
          level = "danger";
          label = "危険";
        } else if (dueDays <= 30) {
          level = "warning";
          label = "注意";
        }
      } else if (licenseExpiry && courseStart && daysUntil(courseStart) <= 30) {
        task = "更新講習の案内";
        status = "案内対象";
        level = daysUntil(courseStart) <= 0 ? "guide" : "warning";
        label = daysUntil(courseStart) <= 0 ? "案内" : "注意";
      }

      return {
        level,
        label,
        dueDate,
        task,
        status,
        licenseExpiry,
        courseStart,
        applicationDeadline,
        certificateDeadline
      };
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      })[char]);
    }

    function basisHtml(record, result) {
      const items = [];
      if (result.licenseExpiry) items.push(["免許期限", fmt(result.licenseExpiry)]);
      if (result.applicationDeadline) items.push(["申請期限", fmt(result.applicationDeadline)]);
      if (result.certificateDeadline) items.push(["講習証明期限", fmt(result.certificateDeadline)]);
      if (result.courseStart && !record.courseDate) items.push(["講習開始", fmt(result.courseStart)]);
      return items.map(([name, value]) => (
        `<div class="basis-item"><span>${escapeHtml(name)}</span><strong>${escapeHtml(value)}</strong></div>`
      )).join("");
    }

    function showScreen(name) {
      document.getElementById("homeScreen").classList.toggle("active", name === "home");
      document.getElementById("entryScreen").classList.toggle("active", name === "entry");
      document.querySelectorAll("[data-screen]").forEach((button) => {
        button.classList.toggle("active", button.dataset.screen === name && button.closest(".tabs"));
      });
    }

    function render() {
      const records = loadRecords();
      const rows = records
        .map((record) => ({ record, result: analyze(record) }))
        .sort((a, b) => {
          const ad = a.result.dueDate ? a.result.dueDate.getTime() : 8640000000000000;
          const bd = b.result.dueDate ? b.result.dueDate.getTime() : 8640000000000000;
          return ad - bd;
        });

      const counts = { danger: 0, warning: 0, guide: 0, ok: 0 };
      rows.forEach(({ result }) => { counts[result.level] += 1; });
      document.getElementById("dangerCount").textContent = counts.danger;
      document.getElementById("warningCount").textContent = counts.warning;
      document.getElementById("guideCount").textContent = counts.guide;
      document.getElementById("okCount").textContent = counts.ok;

      document.getElementById("listBody").innerHTML = rows.map(({ record, result }) => `
        <tr>
          <td><span class="tag ${result.level}">${escapeHtml(result.label)}</span></td>
          <td><div class="${result.level === "danger" || result.level === "warning" ? "due" : ""}">${fmt(result.dueDate)}</div></td>
          <td>
            <strong>${escapeHtml(record.targetName)}</strong><br>
            <span class="muted">${escapeHtml(record.customerType || "")}${record.licenseNo ? " / " + escapeHtml(record.licenseNo) : ""}</span>
          </td>
          <td><div class="task">${escapeHtml(result.task)}</div></td>
          <td><div class="basis-line">${basisHtml(record, result)}</div></td>
          <td>${escapeHtml(result.status)}</td>
          <td>
            <div class="row-actions">
              <button type="button" class="small-button" data-edit="${escapeHtml(record.id)}">編集</button>
              <button type="button" class="small-button danger-button" data-delete="${escapeHtml(record.id)}">削除</button>
            </div>
          </td>
        </tr>
      `).join("");
    }

    function readForm() {
      const data = {};
      fields.forEach((field) => { data[field] = document.getElementById(field).value.trim(); });
      return {
        id: data.recordId || makeId(),
        targetName: data.targetName,
        customerType: data.customerType,
        licenseNo: data.licenseNo,
        licenseExpiry: data.licenseExpiry,
        applicationDate: data.applicationDate,
        courseDate: data.courseDate,
        certificateNo: data.certificateNo,
        dipsDate: data.dipsDate,
        confirmedDate: data.confirmedDate,
        newExpiry: data.newExpiry
      };
    }

    function fillForm(record) {
      document.getElementById("recordId").value = record.id || "";
      document.getElementById("targetName").value = record.targetName || "";
      document.getElementById("customerType").value = record.customerType || "既存";
      document.getElementById("licenseNo").value = record.licenseNo || "";
      document.getElementById("licenseExpiry").value = record.licenseExpiry || "";
      document.getElementById("applicationDate").value = record.applicationDate || "";
      document.getElementById("courseDate").value = record.courseDate || "";
      document.getElementById("certificateNo").value = record.certificateNo || "";
      document.getElementById("dipsDate").value = record.dipsDate || "";
      document.getElementById("confirmedDate").value = record.confirmedDate || "";
      document.getElementById("newExpiry").value = record.newExpiry || "";
      document.getElementById("formTitle").textContent = "対象者を編集";
      showScreen("entry");
    }

    function clearForm() {
      form.reset();
      document.getElementById("recordId").value = "";
      document.getElementById("customerType").value = "既存";
      document.getElementById("formTitle").textContent = "対象者を登録";
    }

    function exportCsv() {
      const records = loadRecords();
      const headers = ["targetName", "customerType", "licenseNo", "licenseExpiry", "applicationDate", "courseDate", "certificateNo", "dipsDate", "confirmedDate", "newExpiry"];
      const csv = [headers.join(",")].concat(records.map((record) => (
        headers.map((key) => `"${String(record[key] || "").replace(/"/g, '""')}"`).join(",")
      ))).join("\n");
      const blob = new Blob([`\ufeff${csv}`], { type: "text/csv;charset=utf-8" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "renewal_license_records.csv";
      a.click();
      URL.revokeObjectURL(a.href);
    }

    function parseCsvLine(line) {
      const result = [];
      let current = "";
      let quoted = false;
      for (let i = 0; i < line.length; i += 1) {
        const char = line[i];
        if (char === '"' && quoted && line[i + 1] === '"') {
          current += '"';
          i += 1;
        } else if (char === '"') {
          quoted = !quoted;
        } else if (char === "," && !quoted) {
          result.push(current);
          current = "";
        } else {
          current += char;
        }
      }
      result.push(current);
      return result;
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      const record = readForm();
      const records = loadRecords();
      const index = records.findIndex((item) => item.id === record.id);
      if (index >= 0) records[index] = record;
      else records.push(record);
      saveRecords(records);
      clearForm();
      render();
      showScreen("home");
    });

    document.querySelectorAll("[data-screen]").forEach((button) => {
      button.addEventListener("click", () => showScreen(button.dataset.screen));
    });
    document.getElementById("clearForm").addEventListener("click", clearForm);
    document.getElementById("exportCsv").addEventListener("click", exportCsv);
    document.getElementById("importCsvButton").addEventListener("click", () => document.getElementById("importCsv").click());
    document.getElementById("importCsv").addEventListener("change", async (event) => {
      const file = event.target.files[0];
      if (!file) return;
      const text = await file.text();
      const lines = text.replace(/^\ufeff/, "").split(/\r?\n/).filter(Boolean);
      const headers = parseCsvLine(lines.shift() || "");
      const records = lines.map((line) => {
        const cols = parseCsvLine(line);
        const record = { id: makeId() };
        headers.forEach((key, index) => { record[key] = cols[index] || ""; });
        return record;
      });
      saveRecords(records.length ? records : sampleCopy());
      event.target.value = "";
      render();
    });
    document.getElementById("resetSamples").addEventListener("click", () => {
      saveRecords(sampleCopy());
      clearForm();
      render();
    });
    document.getElementById("listBody").addEventListener("click", (event) => {
      const editId = event.target.dataset.edit;
      const deleteId = event.target.dataset.delete;
      const records = loadRecords();
      if (editId) {
        const record = records.find((item) => item.id === editId);
        if (record) fillForm(record);
      }
      if (deleteId) {
        const next = records.filter((item) => item.id !== deleteId);
        saveRecords(next.length ? next : sampleCopy());
        render();
      }
    });

    render();
  </script>
</body>
</html>
